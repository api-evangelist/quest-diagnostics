aid: quest-diagnostics
name: Quest Diagnostics
description: >-
  Quest Diagnostics is a Fortune 500 company and the world's leading provider
  of diagnostic information services that patients and doctors can rely on to
  make better healthcare decisions. Quest operates 2,000+ patient service
  centers, performs 200+ million tests annually, and supplies its Quanum
  family of solutions for connecting laboratories, EHR systems, and health
  plans.
