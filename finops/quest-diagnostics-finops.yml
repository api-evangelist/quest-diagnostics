notes: Quest does not publish a per-API meter or invoice surface; FinOps mapping is anchored to the
  enterprise integration contract.
description: FOCUS-aligned FinOps for Quest Diagnostics enterprise integrations is contract-based;
  Quanum Data Exchange and other interoperability surfaces are billed per the customer agreement rather
  than on a public per-API tariff.
sources:
  - https://www.questdiagnostics.com/
billingModel:
  pricingCategory: Enterprise Contract
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Quest Diagnostics
  ServiceCategory: Healthcare
  ProviderName: Quest Diagnostics
  PublisherName: Quest Diagnostics Incorporated
  InvoiceIssuerName: Quest Diagnostics Incorporated
  BillingCurrency: USD
meters:
  - name: integration_contract
    description: Enterprise integration contract covering Quanum Data Exchange and related interfaces.
    unit: varies
    aggregation: sum
    dimensions:
      - contract
principles:
  - name: Visibility
    description: Surface Quest integration spend through procurement records and the customer-side
      EHR vendor's billing data; Quest does not expose a self-serve usage API.
  - name: Allocation
    description: Allocate the contract spend against the consuming clinical or operations cost center
      named in the agreement.
  - name: Optimization
    description: Optimization happens at contract renewal; consolidate Quanum interfaces and prune unused
      lab order/result feeds.
  - name: Accountability
    description: Healthcare IT and clinical informatics co-own the Quest contract; engineering routes
      changes through the Quest account team.
