apis:
  - aid: quest-diagnostics:quanum-data-exchange
    name: Quanum Data Exchange
    description: >-
      Quanum Data Exchange is Quest's interoperability service for delivering
      laboratory and diagnostic results into electronic health record systems,
      enabling integrated ordering and resulting workflows across healthcare
      organizations.
    humanURL: https://www.questdiagnostics.com/business-solutions/health-systems-it-solutions
    tags:
      - Healthcare
      - Lab Results
      - Interoperability
      - EHR
    properties:
      - type: Documentation
        url: https://www.questdiagnostics.com/business-solutions/health-systems-it-solutions
  - aid: quest-diagnostics:quanum-elabs
    name: Quanum eLabs
    description: >-
      Quanum eLabs is a web-based laboratory ordering and results delivery
      service that integrates with provider workflows so clinicians can
      submit orders, track samples, and review Quest results electronically.
    humanURL: https://www.questdiagnostics.com/healthcare-professionals/about-our-tests/quanum-elabs
    tags:
      - Healthcare
